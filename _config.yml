# Jekyll configuration for dajia archive
title: 腾讯·大家 存档
description: web.archive.org 中 dajia.qq.com 历史文章存档
url: "https://lishuhang.me"
baseurl: "/dajia"
timezone: Asia/Shanghai
lang: zh-CN

# Post settings - use simple /posts/title/ permalink
permalink: /posts/:title/

# Markdown
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# Collections
collections:
  posts:
    output: true
    permalink: /posts/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Exclude
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - scripts/
  - _assets/
  - .github/
