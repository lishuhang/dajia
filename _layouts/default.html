<!DOCTYPE html>
<html lang="{{ site.lang | default: "zh-CN" }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title | escape }} - {% endif %}{{ site.title | escape }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 | escape }}">
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="site-title" href="{{ "/" | relative_url }}">{{ site.title | escape }}</a>
      <div class="search-box">
        <input type="text" id="title-search" placeholder="搜索标题…" autocomplete="off">
        <div class="search-results-dropdown" id="search-results"></div>
      </div>
      <nav class="header-nav">
        <a href="{{ "/" | relative_url }}">首页</a>
        <a href="https://lishuhang.me/">主站</a>
      </nav>
    </div>
  </header>

  {{ content }}

  <footer class="site-footer">
    <div class="footer-inner">
      <p>{{ site.description | escape }} · 共 {{ site.posts.size }} 篇文章</p>
    </div>
  </footer>

  <script>
    window.DAJIA_POSTS = [
      {% for post in site.posts %}
      {
        title: {{ post.title | jsonify }},
        author: {{ post.author | default: "" | jsonify }},
        date: {{ post.date | date: "%Y-%m-%d" | jsonify }},
        url: {{ post.url | relative_url | jsonify }}
      }{% unless forloop.last %},{% endunless %}
      {% endfor %}
    ];
  </script>
  <script src="{{ "/assets/search.js" | relative_url }}"></script>
</body>
</html>
