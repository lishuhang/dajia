---
layout: default
---
<div class="home">
  <h1 class="page-heading">{{ site.title | escape }}</h1>
  {{ content }}
  {% if site.posts.size > 0 %}
    <h2>全部文章 ({{ site.posts.size }})</h2>
    <ul class="post-list">
      {% for post in site.posts %}
        <li>
          <a class="post-link" href="{{ post.url | relative_url }}">{{ post.title | escape }}</a>
          <span class="post-meta">{{ post.date | date: "%Y-%m-%d" }} · {{ post.author }}</span>
        </li>
      {% endfor %}
    </ul>
  {% endif %}
</div>
