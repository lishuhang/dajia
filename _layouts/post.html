---
layout: default
---
<article class="article">
  <header class="article-header">
    <h1 class="article-title">{{ page.title | escape }}</h1>
    <p class="article-meta">
      <time>{{ page.date | date: "%Y年%m月%d日" }}</time>
      {% if page.author %}<span class="meta-sep">·</span><span>{{ page.author }}</span>{% endif %}
      <span class="meta-sep">·</span>
      <a href="{{ "/" | relative_url }}" class="back-link">返回首页</a>
    </p>
  </header>
  <div class="article-content">
    {{ content }}
  </div>
</article>
